name: Build Release APK

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > app/release.keystore

      - name: Build release APK
        run: ./gradlew clean :app:assembleRelease
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          GH_RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          GH_RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Verify APK signature
        run: jarsigner -verify -certs -verbose app/build/outputs/apk/release/CupcakeComics-0.1.0.apk

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/CupcakeComics-*.apk
